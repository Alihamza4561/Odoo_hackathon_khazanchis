<!-- ============================================================
     TOPBAR — copy this <header> into every page, inside .main-col,
     as the first child (sibling before .page).
     Requires js/role-handler.js to be loaded for the role switcher
     and notification badge to do anything.
     ============================================================ -->
<header class="topbar">
  <button class="icon-btn" id="sidebarToggle" aria-label="Toggle menu" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>

  <div class="topbar-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" placeholder="Search assets, tags, employees…">
  </div>

  <div class="topbar-spacer"></div>

  <div class="role-switcher">
    <label>Viewing as</label>
    <select data-role-select>
      <option value="admin">Admin</option>
      <option value="asset-manager">Asset Manager</option>
      <option value="department-head">Department Head</option>
      <option value="employee">Employee</option>
    </select>
  </div>

  <button class="icon-btn" aria-label="Notifications">
    <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
    <span class="badge-dot">3</span>
  </button>

  <div class="avatar">S</div>
</header>
